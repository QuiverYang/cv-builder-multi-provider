<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resume</title>
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #5b5b5b;
    --line: #d8d8d8;
    --bg: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--fg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica,
                 "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", sans-serif;
    font-size: 14px;
    line-height: 1.55;
    margin: 0;
    padding: 48px 56px;
    max-width: 820px;
    margin-left: auto;
    margin-right: auto;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  h1.name {
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0 0 4px;
  }
  .headline {
    color: var(--muted);
    font-size: 15px;
    margin: 0 0 8px;
  }
  .contact {
    color: var(--muted);
    font-size: 12.5px;
    margin: 0 0 28px;
  }
  .contact a { color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--line); }
  section.sec {
    margin: 22px 0;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }
  section.sec h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin: 0 0 12px;
    font-weight: 600;
  }
  .exp { margin: 0 0 18px; }
  .exp-head {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 4px 8px;
    margin-bottom: 4px;
  }
  .exp-title { font-weight: 600; }
  .exp-sep { color: var(--muted); }
  .exp-company { color: var(--fg); }
  .exp-date { margin-left: auto; color: var(--muted); font-size: 12.5px; font-variant-numeric: tabular-nums; }
  .loc { color: var(--muted); font-size: 12.5px; }
  ul.bullets { margin: 4px 0 0 18px; padding: 0; }
  ul.bullets li { margin: 3px 0; }
  .edu { display: flex; gap: 10px; align-items: baseline; margin: 0 0 6px; }
  .edu-school { font-weight: 600; }
  .edu-degree { color: var(--muted); }
  .edu-date { margin-left: auto; color: var(--muted); font-size: 12.5px; font-variant-numeric: tabular-nums; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill {
    border: 1px solid var(--line);
    padding: 3px 10px;
    border-radius: 2px;
    font-size: 12.5px;
  }
  ul { margin: 0; padding-left: 20px; }
  @media print {
    body { padding: 18mm; font-size: 11pt; max-width: unset; }
    section.sec { break-inside: avoid; }
    .exp { break-inside: avoid; }
  }
</style>
</head>

{{HEADER}}
</header>
<main>
{{SECTIONS}}
</main>
</body>
</html>
