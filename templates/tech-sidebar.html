<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resume</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #ffffff;
    --ink: #111827;
    --muted: #64748b;
    --line: #e2e8f0;
    --cyan: #0891b2;
    --lime: #65a30d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 28px;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    font-size: 13.5px;
    line-height: 1.55;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .page {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 300px 1fr;
    background: var(--card);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(2, 6, 23, .28);
  }
  aside {
    background: #f8fafc;
    border-right: 1px solid var(--line);
    padding: 34px 28px;
  }
  main { padding: 36px 38px; }
  .masthead h1.name { margin: 0 0 6px; font-size: 30px; letter-spacing: -.02em; }
  .headline { margin: 0 0 14px; color: var(--cyan); font-weight: 700; }
  .contact { margin: 0 0 24px; color: var(--muted); font-size: 12px; line-height: 1.75; }
  .contact a { color: var(--cyan); text-decoration: none; }
  aside section.sec { margin: 0 0 24px; }
  main section.sec { margin: 0 0 26px; }
  section.sec h2 {
    margin: 0 0 12px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .2em;
    text-transform: uppercase;
  }
  main section.sec h2 {
    color: var(--cyan);
    padding-bottom: 8px;
    border-bottom: 2px solid var(--line);
  }
  .exp { position: relative; margin: 0 0 22px; padding-left: 18px; break-inside: avoid; }
  .exp::before { content: ""; position: absolute; left: 0; top: 5px; width: 8px; height: 8px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 0 4px #ecfccb; }
  .exp-head { display: flex; flex-wrap: wrap; gap: 4px 8px; align-items: baseline; }
  .exp-title { font-weight: 800; }
  .exp-company { color: var(--ink); font-weight: 600; }
  .exp-sep, .loc { color: var(--muted); }
  .exp-date { margin-left: auto; color: var(--muted); font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  ul.bullets { margin: 7px 0 0 18px; padding: 0; }
  ul.bullets li { margin: 3px 0; }
  .edu { margin-bottom: 9px; }
  .edu-school { font-weight: 800; }
  .edu-degree, .edu-date { color: var(--muted); margin-left: 5px; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
  .skill {
    color: #075985;
    background: #e0f2fe;
    border: 1px solid #bae6fd;
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 700;
  }
  aside .skill { display: inline-block; color: #365314; background: #ecfccb; border-color: #bef264; }
  ul { margin: 0; padding-left: 18px; }
  @media print { body { background: #fff; padding: 0; } .page { box-shadow: none; border-radius: 0; } section.sec, .exp { break-inside: avoid; } }
  @media (max-width: 760px) { .page { grid-template-columns: 1fr; } aside { border-right: 0; border-bottom: 1px solid var(--line); } }
</style>
</head>
<body>
{{TODOS}}
<div class="page">
  <aside>
    <div class="masthead">{{HEADER}}</div>
    {{SIDEBAR_SECTIONS}}
  </aside>
  <main>{{MAIN_SECTIONS}}</main>
</div>
</body>
</html>
