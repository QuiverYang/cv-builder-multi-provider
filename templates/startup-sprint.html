<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resume</title>
<style>
  :root { --ink:#0f172a; --muted:#64748b; --line:#dbeafe; --blue:#2563eb; --green:#10b981; --amber:#f59e0b; --bg:#eef6ff; }
  * { box-sizing:border-box; }
  body { margin:0; padding:28px; background:linear-gradient(135deg, #dbeafe, #f0fdf4 55%, #fff7ed); color:var(--ink); font-family:"Inter", "PingFang TC", "Microsoft JhengHei", sans-serif; font-size:13.5px; line-height:1.55; word-break:break-word; overflow-wrap:anywhere; }
  .page { max-width:980px; margin:0 auto; display:grid; grid-template-columns:310px 1fr; gap:18px; }
  aside, main { background:rgba(255,255,255,.92); border:1px solid var(--line); border-radius:24px; box-shadow:0 18px 48px rgba(37,99,235,.14); }
  aside { padding:28px; align-self:start; position:relative; overflow:hidden; }
  aside::before { content:""; position:absolute; right:-30px; top:-30px; width:110px; height:110px; background:var(--green); border-radius:50%; opacity:.18; }
  main { padding:34px 36px; }
  h1.name { margin:0; font-size:34px; line-height:1.02; letter-spacing:-.04em; }
  .headline { display:inline-block; margin:12px 0; padding:6px 12px; background:#dcfce7; color:#047857; border-radius:999px; font-weight:900; }
  .contact { margin:0 0 24px; color:var(--muted); font-size:12px; line-height:1.75; }
  .contact a { color:var(--blue); text-decoration:none; font-weight:800; }
  section.sec { margin:0 0 24px; }
  section.sec h2 { margin:0 0 12px; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--blue); }
  main section.sec h2 { display:flex; align-items:center; gap:10px; }
  main section.sec h2::before { content:""; width:30px; height:10px; background:linear-gradient(90deg,var(--green),var(--amber)); border-radius:999px; }
  .exp { margin:0 0 18px; padding:16px 16px 16px 18px; background:#f8fbff; border:1px solid #bfdbfe; border-radius:18px; border-left:7px solid var(--blue); break-inside:avoid; }
  .exp-head { display:flex; flex-wrap:wrap; gap:4px 8px; align-items:baseline; }
  .exp-title { font-weight:950; }
  .exp-company { color:#047857; font-weight:800; }
  .exp-date { margin-left:auto; padding:3px 8px; background:#fef3c7; color:#92400e; border-radius:999px; font-size:11px; font-weight:900; }
  .exp-sep,.loc,.edu-degree,.edu-date { color:var(--muted); }
  ul.bullets { margin:8px 0 0; padding-left:18px; }
  li::marker { color:var(--green); }
  .edu { margin-bottom:10px; }
  .edu-school { font-weight:900; }
  .skills-wrap { display:flex; flex-wrap:wrap; gap:7px; }
  .skill { display:inline-block; padding:5px 10px; border-radius:10px; background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; font-size:12px; font-weight:800; }
  aside .skill { background:#ecfdf5; color:#047857; border-color:#a7f3d0; }
  ul { margin:0; padding-left:18px; }
  @media print { body{background:#fff;padding:0}.page{display:block}.page>*{box-shadow:none;margin-bottom:14px}.exp,section.sec{break-inside:avoid} }
  @media (max-width:760px){ .page{grid-template-columns:1fr} }
</style>
</head>
<body>
{{TODOS}}
<div class="page">
  <aside><div class="masthead">{{HEADER}}</div>{{SIDEBAR_SECTIONS}}</aside>
  <main>{{MAIN_SECTIONS}}</main>
</div>
</body>
</html>
