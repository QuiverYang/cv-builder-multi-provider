<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resume</title>
<style>
  :root {
    --fg: #1b1f3a;
    --muted: #5a6178;
    --bg: #f6f1eb;
    --card: #ffffff;
    --accent: #d94e4e;
    --accent-2: #2c8a8a;
    --accent-3: #e8a33d;
    --sidebar-bg: #1b1f3a;
    --sidebar-fg: #f6f1eb;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Georgia", "Times New Roman", "PingFang TC",
                 "Microsoft JhengHei", "Noto Serif CJK TC", serif;
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    padding: 28px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .page {
    max-width: 960px;
    margin: 0 auto;
    background: var(--card);
    display: grid;
    grid-template-columns: 280px 1fr;
    box-shadow: 0 4px 20px rgba(27, 31, 58, 0.08);
    border-radius: 6px;
    overflow: hidden;
  }
  aside.sidebar {
    background: var(--sidebar-bg);
    color: var(--sidebar-fg);
    padding: 40px 28px;
  }
  aside.sidebar .masthead h1.name {
    font-size: 26px;
    margin: 0 0 6px;
    color: var(--accent-3);
    font-family: "Helvetica Neue", -apple-system, "PingFang TC",
                 "Microsoft JhengHei", sans-serif;
    letter-spacing: 0.02em;
  }
  aside.sidebar .headline {
    font-size: 13px;
    font-style: italic;
    color: #d8d2c7;
    margin: 0 0 16px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--accent);
  }
  aside.sidebar .contact { font-size: 12px; color: #d8d2c7; margin-bottom: 24px; line-height: 1.8; }
  aside.sidebar .contact a { color: var(--accent-3); text-decoration: none; }
  aside.sidebar section.sec { margin-bottom: 22px; padding-top: 0; border-top: 0; }
  aside.sidebar section.sec h2 {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent-3);
    text-transform: uppercase;
    border-bottom: 1px solid rgba(232, 163, 61, 0.3);
    padding-bottom: 4px;
    margin: 0 0 10px;
  }
  main.content {
    padding: 40px 36px;
  }
  main.content section.sec { margin: 0 0 26px; padding-top: 0; border-top: 0; }
  main.content section.sec h2 {
    font-family: "Helvetica Neue", -apple-system, "PingFang TC",
                 "Microsoft JhengHei", sans-serif;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin: 0 0 14px;
    position: relative;
    padding-left: 28px;
  }
  main.content section.sec h2::before {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    width: 20px;
    height: 3px;
    background: var(--accent-2);
    transform: translateY(-50%);
  }
  .exp { margin-bottom: 18px; padding-left: 14px; border-left: 3px solid var(--accent-2); }
  .exp-head {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 8px;
    margin-bottom: 6px;
  }
  .exp-title { font-weight: 700; color: var(--accent); }
  .exp-sep { color: var(--muted); }
  .exp-company { font-style: italic; color: var(--fg); }
  .exp-date {
    margin-left: auto;
    background: var(--accent-3);
    color: #3b2a0a;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11.5px;
    font-variant-numeric: tabular-nums;
  }
  .loc { color: var(--muted); font-size: 12px; }
  ul.bullets { margin: 6px 0 0 0; padding-left: 18px; }
  ul.bullets li { margin: 3px 0; }
  ul.bullets li::marker { color: var(--accent-2); }
  .edu { margin-bottom: 10px; }
  .edu-school { font-weight: 700; }
  .edu-degree { color: var(--muted); margin-left: 6px; }
  .edu-date { color: var(--accent); margin-left: 8px; font-variant-numeric: tabular-nums; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-3) 100%);
    color: white;
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 12px;
    font-weight: 600;
  }
  aside .skill {
    background: transparent;
    border: 1px solid var(--accent-3);
    color: var(--accent-3);
  }
  ul { margin: 0; padding-left: 20px; }
  aside ul li::marker { color: var(--accent-3); }
  @media print {
    body { background: white; padding: 0; }
    .page { box-shadow: none; grid-template-columns: 240px 1fr; }
    section.sec { break-inside: avoid; }
    .exp { break-inside: avoid; }
  }
  @media (max-width: 720px) {
    .page { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
{{TODOS}}
<div class="page">
  <aside class="sidebar">
    <div class="masthead">{{HEADER}}</div>
    {{SIDEBAR_SECTIONS}}
  </aside>
  <main class="content">
    {{MAIN_SECTIONS}}
  </main>
</div>
</body>
</html>
