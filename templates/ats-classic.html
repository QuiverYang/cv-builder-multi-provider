<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resume</title>
<style>
  :root { --fg: #111827; --muted: #4b5563; --line: #d1d5db; --accent: #1f2937; }
  * { box-sizing: border-box; }
  body {
    font-family: Arial, "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: var(--fg);
    background: #fff;
    margin: 0 auto;
    max-width: 820px;
    padding: 42px 54px;
    font-size: 13.5px;
    line-height: 1.5;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .masthead { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 14px; margin-bottom: 22px; }
  h1.name { font-size: 28px; margin: 0 0 4px; letter-spacing: .03em; text-transform: uppercase; }
  .headline { margin: 0 0 7px; font-weight: 700; color: var(--accent); }
  .contact { margin: 0; color: var(--muted); font-size: 12.5px; }
  .contact a { color: var(--muted); text-decoration: none; }
  section.sec { margin: 18px 0; }
  section.sec h2 {
    font-size: 12px;
    margin: 0 0 9px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--line);
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .exp { margin-bottom: 14px; break-inside: avoid; }
  .exp-head { display: flex; flex-wrap: wrap; gap: 4px 7px; align-items: baseline; }
  .exp-title, .exp-company, .edu-school { font-weight: 700; }
  .exp-date, .edu-date { margin-left: auto; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
  .exp-sep, .loc, .edu-degree { color: var(--muted); }
  ul.bullets { margin: 5px 0 0 18px; padding: 0; }
  ul.bullets li { margin: 2px 0; }
  .edu { display: flex; gap: 8px; align-items: baseline; margin-bottom: 6px; }
  .skills-wrap { display: block; }
  .skill::after { content: " · "; color: var(--muted); }
  .skill:last-child::after { content: ""; }
  ul { margin: 0; padding-left: 18px; }
  @media print { body { padding: 16mm; max-width: none; font-size: 10.5pt; } }
</style>
</head>

<main>{{SECTIONS}}</main>
</body>
</html>
