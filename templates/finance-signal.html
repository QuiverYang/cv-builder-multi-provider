<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resume</title>
<style>
  :root { --ink:#0b1220; --muted:#64748b; --green:#16a34a; --blue:#0ea5e9; --lime:#a3e635; --line:#d9f99d; }
  * { box-sizing:border-box; }
  body { margin:0; padding:28px; background:#0b1220; color:var(--ink); font-family:"IBM Plex Sans", "PingFang TC", "Microsoft JhengHei", sans-serif; font-size:13.5px; line-height:1.56; word-break:break-word; overflow-wrap:anywhere; }
  .page { max-width:960px; margin:0 auto; display:grid; grid-template-columns:275px 1fr; background:#f8fafc; border-radius:18px; overflow:hidden; box-shadow:0 0 0 1px rgba(163,230,53,.3), 0 28px 80px rgba(14,165,233,.18); }
  aside { background:#07111f; color:#e2e8f0; padding:34px 26px; }
  main { padding:36px 38px; background:linear-gradient(180deg, #f8fafc, #ffffff); }
  h1.name { margin:0 0 8px; font-size:31px; color:#fff; letter-spacing:-.03em; }
  .headline { margin:0 0 14px; color:var(--lime); font-weight:900; }
  .contact { margin:0 0 24px; color:#a7b3c4; font-size:12px; line-height:1.7; }
  .contact a { color:#7dd3fc; text-decoration:none; }
  section.sec { margin:0 0 24px; }
  section.sec h2 { margin:0 0 12px; font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--blue); }
  aside section.sec h2 { color:var(--lime); }
  main section.sec h2 { padding-bottom:8px; border-bottom:1px solid #dbeafe; }
  .exp { margin:0 0 18px; padding:15px 0 15px 18px; border-left:4px solid var(--green); break-inside:avoid; position:relative; }
  .exp::after { content:""; position:absolute; left:-4px; bottom:0; width:4px; height:34%; background:var(--blue); }
  .exp-head { display:flex; flex-wrap:wrap; gap:4px 8px; align-items:baseline; }
  .exp-title { font-weight:950; }
  .exp-company { color:#047857; font-weight:850; }
  .exp-date { margin-left:auto; color:#0369a1; font-size:12px; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
  .exp-sep,.loc,.edu-degree,.edu-date { color:var(--muted); }
  ul.bullets { margin:8px 0 0; padding-left:18px; }
  li::marker { color:var(--green); }
  .edu { margin-bottom:10px; }
  .edu-school { font-weight:900; }
  .skills-wrap { display:flex; flex-wrap:wrap; gap:7px; }
  .skill { display:inline-block; padding:5px 10px; background:#dcfce7; color:#166534; border-radius:6px; font-size:12px; font-weight:850; }
  aside .skill { background:#132617; color:#bef264; border:1px solid #365314; }
  ul { margin:0; padding-left:18px; }
  @media print { body{background:#fff;padding:0}.page{box-shadow:none;border-radius:0}.exp,section.sec{break-inside:avoid} }
  @media (max-width:760px){ .page{grid-template-columns:1fr} }
</style>
</head>
<body>

  <aside><div class="masthead">{{HEADER}}</div>{{SIDEBAR_SECTIONS}}</aside>
  <main>{{MAIN_SECTIONS}}</main>
</div>
</body>
</html>
